# Site settings
title: "ML / AI Research Portfolio"
description: >
  A curated collection of machine-learning and AI research projects,
  coursework, and experiments.
author: "Your Name"
email: your.email@example.com

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Navigation links shown in the header
header_pages:
  - projects/index.html
  - about.md

# URL settings (update before deploying to GitHub Pages)
baseurl: ""
url: "https://yourusername.github.io"

# Permalink style
permalink: /:categories/:title/

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Exclude files from the Jekyll build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
